<!DOCTYPE html>
<html>
<head>
  <title>Call Continuity MVP</title>
</head>
<body>
  <h1>📞 Call Continuity MVP</h1>

  <button style="background-color:green;color:white" onclick="startCall()">Start Call</button>
  <button style="background-color:red;color:white" onclick="endCall()">End Call</button>
  <button onclick="resetDemo()">🔄 Reset Demo</button>

  <h2 id="callStatus">Status: Idle</h2>
  <h3 id="timer">⏱ 00:00</h3>

  <h2>Wallet:</h2>
  <p id="status">Loading...</p>

<script>
  let sessionId = localStorage.getItem("sessionId");
  if (!sessionId) {
    sessionId = Date.now() + "-" + Math.random();
    localStorage.setItem("sessionId", sessionId);
  }

  let callActive = false;
  let seconds = 0;
  let timerInterval = null;
  let warnedLowBalance = false;
  let switchedToCredit = false;

  function formatTime(sec) {
    let mins = Math.floor(sec / 60);
    let secs = sec % 60;
    return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  }

  function startTimer() {
    if (timerInterval) return;

    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById("timer").innerText = "⏱ " + formatTime(seconds);
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    seconds = 0;
    document.getElementById("timer").innerText = "⏱ 00:00";
  }

  async function startCall() {
    await fetch("/start-call", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId })
    });

    callActive = true;
    warnedLowBalance = false;
    switchedToCredit = false;

    document.getElementById("callStatus").innerText = "📡 In Call";
    startTimer();
  }

  async function endCall() {
    await fetch("/end-call", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId })
    });

    resetUI();
  }

  function resetUI() {
    callActive = false;
    warnedLowBalance = false;
    switchedToCredit = false;

    stopTimer();
    document.getElementById("callStatus").innerText = "❌ Call Ended";
  }

  async function resetDemo() {
    await fetch("/reset-session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId })
    });

    resetUI();

    document.getElementById("callStatus").innerText = "Status: Idle";
    document.getElementById("status").innerText = "Balance reset.";

    localStorage.removeItem("sessionId");
    sessionId = Date.now() + "-" + Math.random();
    localStorage.setItem("sessionId", sessionId);
  }

  async function getStatus() {
    const res = await fetch("/status", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId })
    });

    const data = await res.json();

    // 🔁 FULL STATE SYNC
    if (data.callActive && !callActive) {
      callActive = true;
      startTimer();
      document.getElementById("callStatus").innerText = "📡 In Call";
    }

    if (!data.callActive && callActive) {
      resetUI();
    }

    // ⚠️ Low balance warning
    if (data.callActive && data.balance <= 5 && data.balance > 0 && !warnedLowBalance) {
      warnedLowBalance = true;
      alert("⚠️ Low balance! Switching to credit soon...");
    }

    // 🔴 Switched to credit
    if (data.callActive && data.usingCredit && !switchedToCredit) {
      switchedToCredit = true;
      alert("🚨 You are now using borrowed airtime!");
    }

    // 💰 UI DISPLAY
    document.getElementById("status").innerHTML = `
      <b>Balance:</b> ₦${data.balance} <br>
      <b>Credit:</b> ₦${data.credit} <br>
      <b>Mode:</b> ${data.usingCredit ? "🔴 Credit Mode" : "🟢 Airtime"} <br>
      <b>Status:</b> ${data.callActive ? "📡 Active Call" : "❌ No Call"}
    `;
  }

  setInterval(getStatus, 1000);
</script>
</body>
</html>
