<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Continue Mt Call MVP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .start {
      background: #16a34a;
      color: white;
    }

    .end {
      background: #dc2626;
      color: white;
    }

    .reset {
      background: #475569;
      color: white;
    }

    #callStatus {
      margin-top: 20px;
      font-size: 20px;
    }

    #timer {
      font-size: 28px;
      margin: 10px 0;
    }

    .wallet {
      margin-top: 20px;
      text-align: left;
    }

    .bar {
      height: 10px;
      border-radius: 5px;
      margin-top: 5px;
    }

    .balance-bar {
      background: green;
    }

    .credit-bar {
      background: red;
    }
  </style>
</head>

<body>

  <h1>📞 Ozed Call Continuity </h1>

  <div class="container">

    <button class="start" onclick="startCall()">Start Call</button>
    <button class="end" onclick="endCall()">End Call</button>
    <button class="reset" onclick="resetDemo()">🔄 Reset</button>

    <h2 id="callStatus">Status: Idle</h2>
    <h3 id="timer">⏱ 00:00</h3>

    <div class="wallet">
      <h3>Wallet</h3>
      <p style="font-size:12px;color:gray;">
  *Call continues seamlessly even after airtime exhaustion
</p>
      <div id="status">Loading...</div>

      <div>
        <small>Balance</small>
        <div class="bar balance-bar" id="balanceBar"></div>
      </div>

      <div>
        <small>Credit</small>
        <div class="bar credit-bar" id="creditBar"></div>
      </div>
    </div>

  </div>

<script>
  let sessionId = localStorage.getItem("sessionId");
  if (!sessionId) {
    sessionId = Date.now() + "-" + Math.random();
    localStorage.setItem("sessionId", sessionId);
  }

  let callActive = false;
  let seconds = 0;
  let timerInterval = null;
  let warnedLowBalance = false;
  let switchedToCredit = false;

  function formatTime(sec) {
    let mins = Math.floor(sec / 60);
    let secs = sec % 60;
    return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  }

  function startTimer() {
    if (timerInterval) return;

    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById("timer").innerText = "⏱ " + formatTime(seconds);
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    seconds = 0;
    document.getElementById("timer").innerText = "⏱ 00:00";
  }

  async function startCall() {
    await fetch("/start-call", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId })
    });

    callActive = true;
    warnedLowBalance = false;
    switchedToCredit = false;

    document.getElementById("callStatus").innerText = "📡 In Call";
    startTimer();
  }

  async function endCall() {
    await fetch("/end-call", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId })
    });

    resetUI();
  }

  function resetUI() {
    callActive = false;
    warnedLowBalance = false;
    switchedToCredit = false;

    stopTimer();
    document.getElementById("callStatus").innerText = "❌ Call Ended";
  }

  async function resetDemo() {
    await fetch("/reset-session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId })
    });

    resetUI();

    document.getElementById("callStatus").innerText = "Status: Idle";
    document.getElementById("status").innerText = "Balance reset.";

    localStorage.removeItem("sessionId");
    sessionId = Date.now() + "-" + Math.random();
    localStorage.setItem("sessionId", sessionId);
  }

  async function getStatus() {
    const res = await fetch("/status", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId })
    });

    const data = await res.json();

    // Sync state
    if (data.callActive && !callActive) {
      callActive = true;
      startTimer();
      document.getElementById("callStatus").innerText = "📡 In Call";
    }

    if (!data.callActive && callActive) {
      resetUI();
    }

    // Alerts
    if (data.callActive && data.balance <= 5 && data.balance > 0 && !warnedLowBalance) {
      warnedLowBalance = true;
      alert("⚠️ Low balance! Switching to credit soon...");
    }

    if (data.callActive && data.usingCredit && !switchedToCredit) {
      switchedToCredit = true;
      alert("🚨 You are now using borrowed airtime!");
    }

    // Update UI
    document.getElementById("status").innerHTML = `
      Balance: ₦${data.balance} <br>
      Credit: ₦${data.credit} <br>
      Mode: ${data.usingCredit ? "🔴 Credit" : "🟢 Airtime"}
    `;

    // Bars (visual)
    document.getElementById("balanceBar").style.width = (data.balance / 15 * 100) + "%";
    document.getElementById("creditBar").style.width = (data.credit / 50 * 100) + "%";
  }

  setInterval(getStatus, 1000);
</script>

</body>
</html>
